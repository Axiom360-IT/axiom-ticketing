name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Build-time env. Real values live in Vercel; CI uses placeholder values
          # for variables that the build references. Add more here as features land.
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      # ── Added in later modules ─────────────────────────────
      # M1:  - name: Unit tests
      #        run: pnpm vitest run
      # M22: - name: E2E tests
      #        run: pnpm playwright test
      # ───────────────────────────────────────────────────────
